schema_version: "1.0"
schema_type: node

# ---------------------------------------------------------------------------
# Node Template
# Copy this file into graphs/<project-id>/nodes/<node-id>.yaml
# Fill in all fields. Remove this comment block before committing.
# ---------------------------------------------------------------------------

node_id: REPLACE_ME                    # kebab-case, unique within the project
title: REPLACE_ME                      # short capability title
type: capability                        # capability | milestone | constraint

why: REPLACE_ME                        # one sentence: why this capability must exist

depends_on: []                         # list of node_id values that must be complete first
                                       # leave empty [] if no dependencies

acceptance:
  - id: REPLACE_ME                       # kebab-case, unique within this node
    criterion: REPLACE_ME                # verifiable, not vague
  - id: REPLACE_ME
    criterion: REPLACE_ME

constraints:
  - REPLACE_ME                         # hard limits the executor must respect

allowed_execution_modes:
  - jules                              # remove executors that are not appropriate for this node

required_artifacts:
  - decision.md
  - result-summary.md
  # add: patch.diff (if code change expected)
  # add: merged_pr  (if PR is required for completion)

status: pending                        # start here; human-owned graph truth changes by review/commit
priority: medium                       # low | medium | high | critical

unlocks: []                            # list of node_id values this node unlocks when complete
