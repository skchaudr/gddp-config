schema_version: "1.0"
schema_type: job

# ---------------------------------------------------------------------------
# Job Template
# Jobs are generated by the runtime from a node + event.
# This template is the canonical shape. Do not hand-craft jobs in production.
# This file exists for testing and manual dry-run missions only.
# ---------------------------------------------------------------------------

job_id: REPLACE_ME                     # job_YYYY_MM_DD_NNN
created_at: REPLACE_ME                 # ISO 8601
event_id: REPLACE_ME                   # evt_... that triggered this job

project_id: REPLACE_ME
repo: REPLACE_ME                       # org/repo
node_id: REPLACE_ME                    # must match a node in graphs/<project-id>/nodes/

job_type: implementation               # implementation | review | reasoning | context_update
executor: REPLACE_ME                   # jules | vertex | pi_worker | vm_worker | human
queue: ready

title: REPLACE_ME
goal: REPLACE_ME                       # "Produce a reviewable result for node X"
why: REPLACE_ME

source_context:
  repo_source: REPLACE_ME
  starting_branch: REPLACE_ME
  target_branch: main
  relevant_paths: []
  related_pr: null
  related_issue: null

constraints: []                        # pulled from node.constraints; add job-specific overrides here

acceptance_criteria: []                # pulled from node.acceptance; do not weaken them here

dependencies: []                       # node:node-id format

priority: medium
risk_level: low
estimated_effort: medium

status: ready
attempt: 0
max_attempts: 3

artifacts_dir: REPLACE_ME             # runtime artifact directory for this job
result_summary_path: null
