schema_version: "1.0"
schema_type: artifact_verification

# ---------------------------------------------------------------------------
# Artifact Verification Schema
# One record per artifact, per job.
# All required_artifacts in a node must verify before the node advances.
# This is a hard gate. No verification = no node advancement.
# ---------------------------------------------------------------------------

verification_id: ver_2026_03_11_014_01
job_id: job_2026_03_11_014
node_id: auth-boundary
artifact_type: merged_pr               # file type from node.required_artifacts

validation_method: github_api_check    # file_exists | content_check | github_api_check | human_audit
verified: true
verified_at: 2026-03-11T09:30:00Z
verified_by: runtime_validator         # runtime_validator | human | codex_reviewer

notes: "PR #43 confirmed merged to main"

# ---------------------------------------------------------------------------
# Validation method descriptions
# ---------------------------------------------------------------------------
# file_exists       — checks that the artifact file exists in the job folder
# content_check     — checks that the file is non-empty and structurally valid
# github_api_check  — queries GitHub API to confirm PR merged, issue closed, etc.
# human_audit       — pauses for human review; waits for manual sign-off
#
# Defaults:
#   Most artifacts:  file_exists + content_check
#   merged_pr:       github_api_check
#   First overnight: human_audit
