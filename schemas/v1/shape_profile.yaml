schema_version: "1.0"
schema_type: shape_profile

# ---------------------------------------------------------------------------
# Shape Profile Schema
# A shape profile encodes what a project type should look like structurally.
# Profiles are optional context for the semantic verification agent; they do
# not mutate graph truth. Content lives in profiles/<profile_id>.yaml (Wave 3).
# ---------------------------------------------------------------------------

profile_id: example-profile
description: Example shape profile template
expected_node_chain:
  - spec
  - implementation
  - tests
invariant_rules:
  - Graph legality must be preserved
  - Acceptance criteria must not weaken
anti_patterns:
  - Runtime silently mutates source graph
  - Acceptance criteria removed without replacement
