schema_version: "1.0"
schema_type: node

# ---------------------------------------------------------------------------
# Node Schema
# A node is a capability, milestone, or bounded project state.
# Nodes are authored by the human. The runtime decision loop reads them and
# writes receipts; human review decides whether graph truth changes.
# ---------------------------------------------------------------------------

node_id: auth-boundary
title: Establish authenticated request boundary
type: capability                        # capability | milestone | constraint

why: Protected actions must only execute for verified users

depends_on:
  - user-session-model
  - route-classification

acceptance:
  - protected routes reject unauthenticated requests
  - authenticated users can access protected actions
  - tests exist for both allowed and denied cases

constraints:
  - do not couple auth logic to UI components
  - preserve future support for role-based permissions

allowed_execution_modes:
  - jules
  - vm_worker
  - human

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: ready                           # see status values below
priority: high                          # low | medium | high | critical

unlocks:
  - role-permission-layer
  - protected-route-audit

# ---------------------------------------------------------------------------
# Node type values
# ---------------------------------------------------------------------------
# capability  — a system behavior that must exist
# milestone   — a checkpoint that groups capabilities
# constraint  — a rule that scopes other nodes (not directly executable)
#
# Status values (human-owned verdict on graph truth — not execution state)
# ---------------------------------------------------------------------------
# pending     — exists but prerequisites not yet met
# ready       — all dependencies complete, can be issued
# complete    — human reviewed, acceptance accepted, graph truth advanced
# deferred    — intentionally postponed
#
# Execution states (running, failed) live on job and queue_record, not here.
