title: Implement authenticated request boundary

prompt: |
  Goal:
  Establish an authenticated request boundary for protected actions.

  Why:
  Protected actions must only execute for verified users.

  Constraints:
  - Do not couple auth enforcement to UI components.
  - Preserve future support for role-based permissions.
  - Prefer minimal surface-area changes.
  - Avoid unrelated refactors.

  Acceptance Criteria (from node auth-boundary):
  - protected-routes-reject-unauthenticated: Protected routes reject unauthenticated requests
  - authenticated-users-access-protected: Authenticated users can access protected actions
  - tests-cover-both-paths: Tests exist for both allowed and denied cases

  Relevant Paths:
  - app/
  - middleware.ts
  - server/
  - tests/

  Related Context:
  - PR #48
  - Node: auth-boundary

  Output Requirements:
  - Implement the change
  - Add/update tests
  - Provide a concise result summary
  - Note any ambiguity or remaining risks

