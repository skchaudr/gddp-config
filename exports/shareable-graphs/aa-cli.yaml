schema_version: '1.0'
schema_type: project_graph_bundle
project_id: aa-cli
project_name: AA CLI
description: Zsh task compiler and dispatcher that turns prompts into validated packets, routes them to executor targets, and tracks runs in a TSV ledger
repo: skchaudr/aa-cli
blueprint:
  vision: A terminal-first dispatch shell where one keystroke fires a validated packet to the right executor and every run leaves a ledger receipt
  architecture_notes: 'Pure zsh CLI with lib/ modules sourced from bin/aa. Packets are JSON validated against schema/packet.schema.json.

    targets.conf maps target names to sync/async commands; aa_fire_packet in lib/fire.zsh is the central router.

    Async targets (codex, jules, pi) dispatch in background and reconcile later updates ledger state from exit_status or remote session status.

    State lives under AA_DATA_HOME (packets) and AA_STATE_HOME (runs, ledger.tsv).

    '
  major_capabilities:
  - shared path/init/validation helpers (common-core)
  - target registry lookup from targets.conf (target-registry)
  - TSV ledger append/update and stale detection (ledger-system)
  - packet fire routing by target mode and async placeholders (dispatch-router)
  - per-executor dispatch paths (grok, pi-cli, gemini, droid, codex, jules, pi-harness)
  - async job reconciliation for codex/jules open rows (reconciliation)
graph_version: '1.0'
created_at: 2026-06-29
last_updated: '2026-07-03'
nodes_dir: nodes/
nodes:
- schema_version: '1.0'
  schema_type: node
  node_id: common-core
  title: Implement shared aa path, init, and packet validation helpers
  type: capability
  why: Every aa module depends on consistent XDG paths, directory bootstrap, jq-backed packet validation, and small string/time utilities before targets, ledger, or fire can run
  depends_on: []
  acceptance:
  - id: aa-root-and-state-paths
    criterion: AA_ROOT, AA_DATA_HOME, AA_STATE_HOME, and AA_SCHEMA resolve to repo-local defaults with env override support in lib/fire.zsh
  - id: aa-init-dirs-creates-state
    criterion: aa_init_dirs creates packets and runs directories under AA_DATA_HOME and AA_STATE_HOME
  - id: aa-validate-packet-schema
    criterion: aa_validate_packet rejects missing packets and invalid JSON against schema/packet.schema.json via jq
  - id: aa-require-jq-errors
    criterion: aa_require_jq prints a clear error and returns non-zero when jq is not installed
  - id: slug-and-iso-helpers
    criterion: aa_slug, aa_now_iso, aa_now_id, and aa_title_from_prompt produce filesystem-safe slugs and UTC timestamps
  constraints:
  - implement helpers in lib/fire.zsh and lib/common.zsh only — do not add runtime dependencies beyond jq and zsh builtins
  - keep AA_TARGETS_CONF default pointing at repo targets.conf
  - do not source executor-specific modules from common-core
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - target-registry
  - ledger-system
- schema_version: '1.0'
  schema_type: node
  node_id: target-registry
  title: Implement targets.conf registry and aa_target_lookup
  type: capability
  why: aa_fire_packet must resolve a packet target and tier to a sync or async command before any executor dispatch branch can run
  depends_on:
  - common-core
  acceptance:
  - id: parse-four-column-rows
    criterion: aa_target_parse_row parses name tier mode command rows from targets.conf
  - id: legacy-three-column-default-tier
    criterion: legacy three-column rows (target mode command) are treated as tier=default
  - id: lookup-exact-tier
    criterion: aa_target_lookup returns mode and command tab-separated for an exact name+tier match
  - id: lookup-fallback-default-tier
    criterion: aa_target_lookup falls back to tier=default when the requested tier is missing
  - id: list-target-names
    criterion: aa_target_names prints deduplicated target names from targets.conf ignoring comments and blank lines
  - id: unknown-target-errors
    criterion: aa_target_lookup errors with aa_die when the target name is not registered
  constraints:
  - keep targets.conf as the single source of truth for executor routing — no hardcoded target table in fire.zsh
  - support both sync and async mode values only
  - preserve existing target aliases (cdx and codex both map to __codex_async)
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - dispatch-router
- schema_version: '1.0'
  schema_type: node
  node_id: ledger-system
  title: Implement TSV ledger append, update, and display
  type: capability
  why: Every fired packet must leave a durable ledger row so deck, reconcile, and the operator can see open, done, error, and stale runs
  depends_on:
  - common-core
  acceptance:
  - id: ledger-append-row
    criterion: aa_ledger_append writes ISO timestamp, id, target, state, ref, and title as tab-separated fields to ledger.tsv
  - id: ledger-update-or-append
    criterion: aa_ledger_update_or_append updates an existing id row instead of duplicating on refire
  - id: ledger-state-for-id
    criterion: aa_ledger_state_for_id returns the current state for a packet id
  - id: stale-detection
    criterion: aa_is_stale marks open rows older than AA_STALE_HOURS as stale in glyph rendering
  - id: ledger-print-formatted
    criterion: aa_ledger_print renders a human-readable table with state glyphs when stdout is a TTY
  constraints:
  - ledger format stays TSV with six columns — do not migrate to JSON or SQLite
  - update operations must be atomic via temp file + mv
  - do not mutate packet JSON from ledger helpers
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - dispatch-router
  - reconciliation
- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-router
  title: Implement aa_fire_packet routing and run directory setup
  type: capability
  why: Firing a packet requires validating input, composing the prompt, creating a run directory, looking up the target, and branching to the correct executor handler
  depends_on:
  - target-registry
  - ledger-system
  acceptance:
  - id: validate-before-fire
    criterion: aa_fire_packet calls aa_validate_packet and aborts before creating a run when the packet is invalid
  - id: run-dir-artifacts
    criterion: each fire copies packet.json, writes prompt.txt via aa_compose_prompt, and reserves output.log under AA_STATE_HOME/runs/<id>
  - id: target-lookup-branch
    criterion: aa_fire_packet calls aa_target_lookup with packet target and tier to obtain mode and command
  - id: sync-inline-path
    criterion: sync targets run the resolved command with prompt on stdin inside workdir and record done or error in the ledger
  - id: async-placeholder-branch
    criterion: async targets with __codex_async, __jules_async, or __pi_async delegate to dedicated dispatch handlers instead of eval-ing the placeholder literally
  - id: receipt-and-toast
    criterion: successful fires print a receipt line and write AA_STATE_HOME/.toast via aa_fire_toast
  constraints:
  - respect packet workdir — default to PWD when workdir is empty
  - honor mutations flag when choosing codex sandbox mode
  - skip clipboard re-copy when the wrapped command owns clipboard (aa_command_owns_clipboard)
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - dispatch-grok
  - dispatch-pi-cli
  - dispatch-gemini
  - dispatch-droid
  - dispatch-codex
  - dispatch-jules
  - dispatch-pi-harness
- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-grok
  title: Wire sync grok (grk) target dispatch
  type: capability
  why: Operators choose the grk target to run Grok inline; aa must route sync grk packets through the grk wrapper without breaking ledger receipts
  depends_on:
  - dispatch-router
  acceptance:
  - id: grk-default-tier
    criterion: targets.conf registers grk default sync grk and aa_target_lookup resolves it
  - id: grk-tier-variants
    criterion: grk speed and frontier tiers resolve to distinct grk command variants including --model grok-frontier
  - id: sync-fire-records-ledger
    criterion: firing a grk sync packet records done or error in ledger.tsv with ref '-'
  - id: prompt-on-stdin
    criterion: composed prompt.txt is passed to grk on stdin inside packet workdir
  - id: acceptance-test-covers-grk
    criterion: tests/acceptance.zsh includes at least one grk or sync-target smoke path
  constraints:
  - grk remains a sync target — do not convert to async without a spec change
  - do not bypass aa_command_owns_clipboard for grk wrapper commands
  - keep tier keys limited to default, speed, frontier
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: medium
  unlocks: []
- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-pi-cli
  title: Wire sync pi-cli (pir) target dispatch
  type: capability
  why: The pir target is the inline Pi CLI path for fast local model runs and must behave like other sync executors in aa_fire_packet
  depends_on:
  - dispatch-router
  acceptance:
  - id: pir-default-tier
    criterion: targets.conf registers pir default sync pir and aa_target_lookup resolves it
  - id: pir-tier-variants
    criterion: pir speed and frontier tiers map to pir --model glm-5 and pir --model claude-sonnet-4.6 respectively
  - id: sync-fire-records-ledger
    criterion: firing a pir packet writes done or error ledger state after inline command completion
  - id: output-captured
    criterion: pir stdout/stderr land in runs/<id>/output.log
  - id: clipboard-ownership
    criterion: pir wrapper commands are listed in aa_command_owns_clipboard so aa does not double-copy clipboard output
  constraints:
  - pir stays sync — background dispatch belongs to dispatch-pi-harness
  - do not require pi-packet binary for pir sync fires
  - preserve existing pir tier naming from targets.conf
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: medium
  unlocks: []
