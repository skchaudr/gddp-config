- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-codex
  title: Wire async codex (__codex_async) background dispatch
  type: capability
  why: Codex runs are long-lived and must fire in the background with a pid ref so reconciliation can later flip open rows to done or error
  depends_on:
  - dispatch-router
  acceptance:
  - id: cdx-async-placeholder
    criterion: targets.conf maps cdx and codex tiers to async __codex_async
  - id: codex-nohup-wrapper
    criterion: aa_fire_packet launches codex exec via nohup wrapper, stores pid in runs/<id>/pid and exit_status file
  - id: mutations-sandbox-flag
    criterion: codex exec receives --sandbox workspace-write when mutations is true and read-only otherwise
  - id: ledger-open-with-pid-ref
    criterion: async codex fire appends ledger row with state open and ref equal to background pid
  - id: receipt-shows-run-dir
    criterion: codex async receipt prints target, title, and runs/<id> path without waiting for completion
  constraints:
  - use AA_CODEX_BIN override for codex binary path
  - do not block aa_fire_packet on codex completion — reconciliation owns terminal state
  - keep cdx and codex as aliases in targets.conf
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - reconciliation
- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-jules
  title: Wire async jules (__jules_async) remote session dispatch
  type: capability
  why: Jules remote sessions are async and need a session id ref in the ledger so reconcile can pull output when the session completes
  depends_on:
  - dispatch-router
  acceptance:
  - id: jules-async-placeholder
    criterion: targets.conf maps jules default async __jules_async
  - id: github-origin-required
    criterion: jules dispatch derives OWNER/REPO from workdir git origin and errors when origin is missing
  - id: jules-remote-new
    criterion: aa_fire_packet runs jules remote new with composed prompt and captures dispatch.log
  - id: session-id-extracted
    criterion: numeric jules session id is parsed from dispatch.log and stored as ledger ref
  - id: ledger-open-on-success
    criterion: successful jules dispatch writes ledger state open with session id ref; failure writes error with ref '-'
  constraints:
  - use AA_JULES_BIN override for jules binary path
  - require github.com origin URL parsing compatible with existing sed transform
  - do not wait for jules completion in aa_fire_packet
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - reconciliation
- schema_version: '1.0'
  schema_type: node
  node_id: dispatch-pi-harness
  title: Wire async pi-harness (__pi_async) background dispatch
  type: capability
  why: Pi harness runs via pi-packet are async and must record an artifact slug ref so reconcile and the operator can find the run output later
  depends_on:
  - dispatch-router
  acceptance:
  - id: pi-async-placeholder
    criterion: targets.conf maps pi default async __pi_async
  - id: pi-packet-binary-check
    criterion: aa_fire_packet errors clearly when AA_PI_PACKET_BIN is missing or not executable
  - id: inline-packet-yaml-built
    criterion: when packet_slug is empty, aa_fire_packet writes runs/<id>/packet.yaml with slug aa-<id> and goal from prompt.txt
  - id: referenced-packet-slug
    criterion: when packet_slug is set, aa_fire_packet uses the referenced YAML from AA_PI_PACKETS without rebuilding goal text
  - id: background-pi-packet-run
    criterion: pi-packet run executes in background via nohup wrapper with pid and exit_status files
  - id: pi-artifact-ref-recorded
    criterion: runs/<id>/pi_artifact stores slug ref and ledger open row uses that ref
  constraints:
  - default pi-packet path is $HOME/.pi/harness/bin/pi-packet unless AA_PI_PACKET_BIN is set
  - honor packet mutations field in generated inline packet YAML
  - do not block on pi-packet completion in aa_fire_packet
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks:
  - reconciliation
- schema_version: '1.0'
  schema_type: node
  node_id: reconciliation
  title: Implement aa_reconcile for async codex and jules ledger rows
  type: capability
  why: Async dispatches leave ledger rows in open state until reconcile inspects process exit or Jules session status and promotes rows to done or error
  depends_on:
  - ledger-system
  - dispatch-codex
  - dispatch-jules
  - dispatch-pi-harness
  acceptance:
  - id: reconcile-codex-open-rows
    criterion: aa_reconcile leaves codex rows open while pid is alive, sets done when exit_status is 0, and error otherwise
  - id: reconcile-jules-session-status
    criterion: aa_reconcile checks jules remote list for session ref and promotes Complete sessions to done after pulling output
  - id: jules-pull-artifacts
    criterion: completed jules reconcile writes output.log and diff.patch under runs/<id> and prints file count to stderr
  - id: jules-failed-sessions
    criterion: jules sessions marked Failed reconcile to ledger state error
  - id: atomic-ledger-rewrite
    criterion: aa_reconcile rewrites ledger.tsv atomically via temp file and mv without dropping non-open rows
  - id: acceptance-test-async-path
    criterion: tests/acceptance.zsh covers async codex reconcile promoting open to done
  constraints:
  - only mutate open rows for codex and jules targets — leave sync targets unchanged
  - do not delete run directories during reconcile
  - pi-harness reconciliation may remain future scope if not yet implemented in lib/reconcile.zsh
  allowed_execution_modes:
  - jules
  - human
  required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  status: complete
  priority: high
  unlocks: []
execution_policy:
  default_executor: jules
  max_concurrent_jobs: 1
  require_human_review_before_overnight: false
  artifact_gate_enforced: true
