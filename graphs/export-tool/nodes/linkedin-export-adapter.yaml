schema_version: "1.0"
schema_type: node

node_id: linkedin-export-adapter
title: Implement LinkedIn export adapter
type: capability

why: |
  LinkedIn is a second named provider with a very different export shape from developer tools.
  This node captures the provider-specific workflow needed to bring LinkedIn data into the same
  archive discipline as the rest of the project.

depends_on:
  - cli-contract-and-archive-layout
  - auth-and-secrets-boundary

acceptance:
  - One CLI path can export or ingest the targeted LinkedIn data into the archive layout
  - The adapter records provenance such as provider, export timestamp, and source method
  - Operator-visible failure messages exist for auth failure, delayed export delivery, and partial archive ingest
  - Raw provider output is preserved separately from any normalized representation
  - The adapter can be rerun without corrupting an existing successful export session

constraints:
  - Handle delayed or asynchronous provider delivery if LinkedIn requires it
  - Preserve original files when possible before transformation
  - Keep provider-specific logic isolated from other adapters

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: pending
priority: normal

unlocks:
  - normalized-manifest
  - resume-and-verification
