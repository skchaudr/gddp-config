schema_version: "1.0"
schema_type: node

node_id: linkedin-export-adapter
title: Implement LinkedIn export adapter
type: capability

why: |
  LinkedIn is a second named provider with a very different export shape from developer tools.
  This node captures the provider-specific workflow needed to bring LinkedIn data into the same
  archive discipline as the rest of the project.

depends_on:
  - cli-contract-and-archive-layout
  - auth-and-secrets-boundary

acceptance:
  - File linkedin_export_manifest.json parses as valid JSON
  - linkedin_export_manifest.json contains keys: provider, export_timestamp, source_method, raw_path, status
  - linkedin_export_manifest.json status == "complete"
  - Raw provider output exists at path referenced by raw_path field
  - CLI command exits 0 on rerun when a prior complete session already exists (no corruption)

constraints:
  - Handle delayed or asynchronous provider delivery if LinkedIn requires it
  - Preserve original files when possible before transformation
  - Keep provider-specific logic isolated from other adapters

allowed_execution_modes:
  - jules

success_artifact:
  file: linkedin_export_manifest.json
  verification: "parse:json, keys_required:[provider, export_timestamp, source_method, raw_path, status], field_equals:[status:complete]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: linkedin_export_manifest.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, export_timestamp, source_method, raw_path, status]
      - field_equals: {status: complete}

required_artifacts:
  - linkedin_export_manifest.json

status: pending
priority: normal

unlocks:
  - normalized-manifest
  - resume-and-verification
