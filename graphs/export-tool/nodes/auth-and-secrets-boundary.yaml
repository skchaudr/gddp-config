schema_version: "1.0"
schema_type: node

node_id: auth-and-secrets-boundary
title: Establish auth and secrets boundary
type: capability

why: |
  Export tooling touches personal accounts and potentially sensitive data. Before provider work can
  scale, the project needs a disciplined boundary for credentials, tokens, session material, and
  local secret handling.

depends_on: []

acceptance:
  - File auth_policy.json parses as valid JSON
  - auth_policy.json contains keys: providers, env_var_names, excluded_paths, safe_failure_behavior
  - auth_policy.json providers array contains >= 3 entries
  - auth_policy.json safe_failure_behavior is a non-empty string >= 20 characters
  - File .gitignore-additions.txt exists and lists at least one excluded path pattern

constraints:
  - Never commit secrets, cookies, or raw personal data
  - Prefer environment variables or local secret files ignored by git
  - Do not broaden scope into multi-user auth or hosted secret managers

allowed_execution_modes:
  - jules

success_artifact:
  file: auth_policy.json
  verification: "parse:json, keys_required:[providers, env_var_names, excluded_paths, safe_failure_behavior], min_providers:3"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: auth_policy.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [providers, env_var_names, excluded_paths, safe_failure_behavior]
      - min_providers: 3

required_artifacts:
  - auth_policy.json
  - .gitignore-additions.txt

status: ready
priority: high

unlocks:
  - claude-export-adapter
  - linkedin-export-adapter
  - google-export-adapter
  - resume-and-verification
