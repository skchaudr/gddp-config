schema_version: "1.0"
schema_type: node

node_id: auth-and-secrets-boundary
title: Establish auth and secrets boundary
type: capability

why: |
  Export tooling touches personal accounts and potentially sensitive data. Before provider work can
  scale, the project needs a disciplined boundary for credentials, tokens, session material, and
  local secret handling.

depends_on: []

acceptance:
  - The project defines how credentials are supplied to provider adapters without hardcoding secrets
  - Temporary files, cookies, and downloaded artifacts are stored in explicitly scoped locations
  - The runbook explains which credentials are needed for each provider and how they are rotated or cleared
  - Logging rules avoid leaking tokens or private payloads
  - At least one failure path confirms that missing credentials fail safely and clearly

constraints:
  - Never commit secrets, cookies, or raw personal data
  - Prefer environment variables or local secret files ignored by git
  - Do not broaden scope into multi-user auth or hosted secret managers

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: ready
priority: high

unlocks:
  - claude-export-adapter
  - linkedin-export-adapter
  - google-export-adapter
  - resume-and-verification
