schema_version: "1.0"
schema_type: node

node_id: normalized-manifest
title: Build normalized manifest across providers
type: capability

why: |
  The archive becomes useful only when the operator can see, search, and verify what each export
  run produced across providers. This node creates the common manifest that unifies those outputs.

depends_on:
  - cli-contract-and-archive-layout
  - claude-export-adapter
  - linkedin-export-adapter
  - google-export-adapter

acceptance:
  - File normalized_manifest.json parses as valid JSON
  - normalized_manifest.json contains keys: providers, entries, generated_at
  - normalized_manifest.json entries array contains >= 1 item
  - Each entry contains keys: provider, captured_at, file_path, size_bytes, normalization_status
  - normalized_manifest.json providers array contains all three providers: claude, linkedin, google
  - Running the manifest build command a second time does not duplicate entries for an unchanged session

constraints:
  - Keep the manifest machine-readable and human-inspectable
  - Do not discard provider-specific provenance needed for debugging
  - Avoid a schema that assumes all providers expose the same fields

allowed_execution_modes:
  - jules

success_artifact:
  file: normalized_manifest.json
  verification: "parse:json, keys_required:[providers, entries, generated_at], min_entries:1, each_entry_requires:[provider, captured_at, file_path, size_bytes, normalization_status]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: normalized_manifest.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [providers, entries, generated_at]
      - min_entries: 1
      - each_entry_requires: [provider, captured_at, file_path, size_bytes, normalization_status]

required_artifacts:
  - normalized_manifest.json

status: pending
priority: high

unlocks:
  - resume-and-verification
