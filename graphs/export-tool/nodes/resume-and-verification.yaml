schema_version: "1.0"
schema_type: node

node_id: resume-and-verification
title: Add resume and verification workflow
type: capability

why: |
  Personal data exports are often slow, flaky, and privacy-sensitive. The operator needs a way to
  resume interrupted work and verify archive completeness without manually diffing raw folders.

depends_on:
  - auth-and-secrets-boundary
  - claude-export-adapter
  - linkedin-export-adapter
  - google-export-adapter
  - normalized-manifest

acceptance:
  - File verification_report.json parses as valid JSON
  - verification_report.json contains keys: checked_at, providers, summary
  - Each entry in providers contains keys: name, status, complete_count, partial_count, unverifiable_count
  - verification_report.json summary contains keys: total_providers, fully_complete, partial, failed
  - Resume CLI command exits 0 on rerun after a prior complete session without overwriting prior raw exports

constraints:
  - Never overwrite a successful raw export silently
  - Prefer append-only or versioned archive behavior where practical
  - Do not claim completeness unless the verification artifact shows the evidence

allowed_execution_modes:
  - jules

success_artifact:
  file: verification_report.json
  verification: "parse:json, keys_required:[checked_at, providers, summary], each_provider_requires:[name, status, complete_count, partial_count, unverifiable_count]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: verification_report.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [checked_at, providers, summary]
      - each_provider_requires: [name, status, complete_count, partial_count, unverifiable_count]

required_artifacts:
  - verification_report.json

status: pending
priority: high

unlocks: []
