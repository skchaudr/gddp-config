schema_version: "1.0"
schema_type: node

node_id: google-export-adapter
title: Implement Google export adapter
type: capability

why: |
  Google exports are likely to be the largest and broadest dataset in this tool. This node covers
  the provider-specific workflow for collecting Google export data while keeping it consistent with
  the shared CLI and archive model.

depends_on:
  - cli-contract-and-archive-layout
  - auth-and-secrets-boundary

acceptance:
  - One CLI path can export or ingest the targeted Google data into the archive layout
  - The adapter records provenance such as provider, export timestamp, and source method
  - Operator-visible failure messages exist for auth failure, long-running export, and partial archive ingest
  - Raw provider output is preserved separately from any normalized representation
  - The adapter can be rerun without corrupting an existing successful export session

constraints:
  - Expect large archive sizes and avoid loading entire exports into memory by default
  - Preserve original files when possible before transformation
  - Keep provider-specific logic isolated from other adapters

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: pending
priority: normal

unlocks:
  - normalized-manifest
  - resume-and-verification
