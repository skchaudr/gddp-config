schema_version: "1.0"
schema_type: node

node_id: google-export-adapter
title: Implement Google export adapter
type: capability

why: |
  Google exports are likely to be the largest and broadest dataset in this tool. This node covers
  the provider-specific workflow for collecting Google export data while keeping it consistent with
  the shared CLI and archive model.

depends_on:
  - cli-contract-and-archive-layout
  - auth-and-secrets-boundary

acceptance:
  - File google_export_manifest.json parses as valid JSON
  - google_export_manifest.json contains keys: provider, export_timestamp, source_method, raw_path, status
  - google_export_manifest.json status == "complete"
  - Raw provider output exists at path referenced by raw_path field
  - CLI command exits 0 on rerun when a prior complete session already exists (no corruption)

constraints:
  - Expect large archive sizes and avoid loading entire exports into memory by default
  - Preserve original files when possible before transformation
  - Keep provider-specific logic isolated from other adapters

allowed_execution_modes:
  - jules

success_artifact:
  file: google_export_manifest.json
  verification: "parse:json, keys_required:[provider, export_timestamp, source_method, raw_path, status], field_equals:[status:complete]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: google_export_manifest.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, export_timestamp, source_method, raw_path, status]
      - field_equals: {status: complete}

required_artifacts:
  - google_export_manifest.json

status: pending
priority: normal

unlocks:
  - normalized-manifest
  - resume-and-verification
