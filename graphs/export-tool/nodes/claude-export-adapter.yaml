schema_version: "1.0"
schema_type: node

node_id: claude-export-adapter
title: Implement Claude export adapter
type: capability

why: |
  Claude is one of the named target providers for the tool. This node implements the bounded logic
  needed to collect Claude export data into the shared archive structure.

depends_on:
  - cli-contract-and-archive-layout
  - auth-and-secrets-boundary

acceptance:
  - File claude_export_manifest.json parses as valid JSON
  - claude_export_manifest.json contains keys: provider, export_timestamp, source_method, raw_path, status
  - claude_export_manifest.json status == "complete"
  - Raw provider output exists at path referenced by raw_path field
  - CLI command exits 0 on rerun when a prior complete session already exists (no corruption)

constraints:
  - Do not intermingle provider-specific raw files with normalized outputs
  - Preserve original files when possible before transformation
  - Keep provider-specific logic isolated from other adapters

allowed_execution_modes:
  - jules

success_artifact:
  file: claude_export_manifest.json
  verification: "parse:json, keys_required:[provider, export_timestamp, source_method, raw_path, status], field_equals:[status:complete]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: claude_export_manifest.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, export_timestamp, source_method, raw_path, status]
      - field_equals: {status: complete}

required_artifacts:
  - claude_export_manifest.json

status: pending
priority: normal

unlocks:
  - normalized-manifest
  - resume-and-verification
