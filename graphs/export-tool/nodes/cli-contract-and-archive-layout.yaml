schema_version: "1.0"
schema_type: node

node_id: cli-contract-and-archive-layout
title: Define CLI contract and archive layout
type: capability

why: |
  Provider adapters can be built in parallel only if they target a stable command surface and a
  shared archive structure. This node defines how exports are invoked, where artifacts land, and
  how operators inspect what was collected.

depends_on: []

acceptance:
  - File archive_layout.yaml parses as valid YAML
  - archive_layout.yaml contains keys: raw, normalized, logs, manifests
  - File cli_contract.md exists and contains sections: Usage, Commands, Archive Layout, Retry Behavior
  - cli_contract.md contains entries for at least these three commands: export, retry, inspect
  - No path value in archive_layout.yaml contains a provider-specific string (claude, linkedin, google)

constraints:
  - Keep the tool local-first and single-operator friendly
  - Do not require cloud storage or a web app
  - Archive paths must avoid provider-specific assumptions where possible

allowed_execution_modes:
  - jules

success_artifact:
  file: archive_layout.yaml
  verification: "parse:yaml, keys_required:[raw, normalized, logs, manifests]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: archive_layout.yaml
    method: content_check
    rules:
      - parse: yaml
      - keys_required: [raw, normalized, logs, manifests]
  - artifact: cli_contract.md
    method: content_check
    rules:
      - sections_required: [Usage, Commands, Archive Layout, Retry Behavior]

required_artifacts:
  - archive_layout.yaml
  - cli_contract.md

status: ready
priority: high

unlocks:
  - claude-export-adapter
  - linkedin-export-adapter
  - google-export-adapter
  - normalized-manifest
