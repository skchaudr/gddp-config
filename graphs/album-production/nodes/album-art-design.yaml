schema_version: '1.0'
schema_type: node
node_id: album-art-design
title: Deliver final album artwork and packaging assets
type: capability
why: Distribution upload requires cover art at platform dimensions and marketing needs
  consistent visual identity derived from demo-era creative direction
depends_on:
- demo-recording
acceptance_criteria:
- id: cover-art-master-3000
  criterion: Final cover art delivered at minimum 3000×3000 px RGB without embedded
    text smaller than platform readability guidelines
- id: alternate-aspect-exports
  criterion: Exports include 1:1 streaming cover and 16:9 banner or social crop documented
    in assets/art/
- id: typography-source-files
  criterion: Layered source file (PSD, AFFINITY, or Figma link) archived for future
    edit requests
- id: art-aligns-album-concept
  criterion: decision.md ties visual mood to the album concept note from songwriting
    with artist approval
- id: parental-advisory-variant
  criterion: If any track requires explicit label, a Parental Advisory variant cover
    is exported alongside the standard cover
constraints:
- artwork must not use unlicensed stock or uncleared photography
- do not upload draft art to distribution — only final approved exports
- keep work-in-progress art out of public repos if it contains unreleased titles
allowed_execution_modes:
- human
required_artifacts:
- decision.md
- result-summary.md
status: pending
priority: medium
unlocks:
- distribution
