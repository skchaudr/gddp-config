schema_version: '1.0'
schema_type: node
node_id: marketing-campaign
title: Build pre-release marketing campaign and content calendar
type: capability
why: Album release day needs scheduled singles teasers, social copy, and press assets
  aligned with arrangement-final track order and positioning
depends_on:
- arrangement
acceptance_criteria:
- id: release-calendar-document
  criterion: Marketing calendar lists pre-save date, single rollout dates, and album
    release date with platform targets
- id: social-copy-per-single
  criterion: Draft social posts exist for at least two pre-release singles with hooks
    tied to arrangement-final track highlights
- id: press-kit-one-sheet
  criterion: Press kit one-sheet includes artist bio, album summary, and contact email
    under docs/marketing/
- id: teaser-audio-clips
  criterion: 15–30 second teaser clips are exported for approved singles without revealing
    unmastered full mixes
- id: campaign-budget-note
  criterion: result-summary.md documents paid vs organic spend assumptions and any
    influencer outreach status
constraints:
- do not announce final release date publicly until distribution node confirms aggregator
  delivery window
- teaser clips must use approved demo or mix snippets only — no leaked masters before
  release
- keep unreleased lyrics out of public posts until songwriting signoff artifacts allow
  it
allowed_execution_modes:
- human
required_artifacts:
- decision.md
- result-summary.md
status: pending
priority: medium
unlocks:
- album-release
