schema_version: "1.0"
schema_type: project_graph

project_id: vault-doctor
project_name: Vault Doctor
description: Python CLI tool that scans, triages, and prescribes fixes for Obsidian vaults
repo: skchaudr/vault-doctor

blueprint:
  vision: A terminal-first tool that gives Obsidian vaults a health check and lets users act on the results
  architecture_notes: |
    Pure Python CLI. Two core modules: doctor.py (analysis) and triage.py (interactive actions).
    doctor.py is the foundation — all triage features depend on scan_vault() being implemented first.
    Uses rich for terminal output, python-frontmatter for YAML parsing, pyyaml for config.
    Mock vault in vault_doctor/mock_vault/ provides test fixtures.
  major_capabilities:
    - vault scanning (file metadata, structure)
    - duplicate detection (MD5 hash)
    - stale TODO identification (frontmatter date)
    - performance check (plugin count, large files)
    - interactive triage CLI (auto-move, reaper, dry-run)

