schema_version: "1.0"
schema_type: node

node_id: obsidian-audit
title: Implement .obsidian folder audit and process detection
type: capability

why: |
  The .obsidian folder contains the full configuration state of a vault —
  which plugins are enabled, hotkeys, themes, and workspace layout. Auditing
  it surfaces hidden performance and health problems that a file scan alone
  can't find. Process detection checks whether Obsidian is currently running
  so the tool can warn before making changes to live vault config.

depends_on:
  - scan-vault-core

acceptance_criteria:
  - id: obsidian-audit-method-exists
    criterion: VaultDoctor has an obsidian_audit(vault_path) method in src/doctor.py
  - id: obsidian-audit-returns-dict
    criterion: 'obsidian_audit returns a dict with at minimum: community_plugins, core_plugins, theme, hotkeys_customized, process_running'
  - id: community-plugins-parsed
    criterion: community_plugins is a list of enabled plugin IDs parsed from .obsidian/community-plugins.json (empty list if file absent)
  - id: core-plugins-parsed
    criterion: core_plugins is a list of enabled plugin IDs parsed from .obsidian/core-plugins.json (empty list if file absent)
  - id: theme-from-appearance
    criterion: theme is the active theme name parsed from .obsidian/appearance.json, or "default" if absent
  - id: hotkeys-customized-bool
    criterion: hotkeys_customized is a bool — True if .obsidian/hotkeys.json exists and is non-empty
  - id: process-running-bool
    criterion: process_running is a bool — True if an Obsidian process is detected on the system
  - id: process-detection-method
    criterion: process detection uses psutil or a subprocess ps check — no platform-specific assumptions
  - id: at-least-3-passing-tests-audit
    criterion: 'at least 3 passing tests covering: full audit dict structure, missing .obsidian files handled gracefully, process detection mocked'
  - id: tests-use-mock-vault-fixture
    criterion: tests use the existing mock vault fixture

constraints:
  - implement in src/doctor.py ONLY — this is the one and only canonical file for VaultDoctor
  - DO NOT touch vault_doctor/src/doctor.py — that path is not used and must not be modified
  - DO NOT touch vault_doctor/src/triage.py or any file under vault_doctor/src/
  - DO NOT commit __pycache__ directories or any .pyc files — these must be in .gitignore
  - handle missing .obsidian subfiles gracefully — return empty/default values, never raise
  - psutil is allowed as a new dependency — add it to requirements.txt
  - do not scan inside plugin subdirectories — only read the top-level JSON config files

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: complete
priority: high

unlocks:
  - triage-cli-core
