schema_version: "1.0"
schema_type: project_graph

project_id: cultural-intel
project_name: Cultural Intelligence Monitor
description: |
  Monitors creator economy, gaming, open source, and developer tools domains.
  Maps cultural signals and noise to financial and behavioral indicators.
  Produces alerts, a dashboard, and weekly reports for clients and teams.
repo: skchaudr/cultural-intel

blueprint:
  vision: Map what culture is doing to what markets will do next
  architecture_notes: |
    Three independent entry nodes — all dispatchable simultaneously.
    Signal taxonomy, data sources, and financial schema are parallel tracks.
    They converge at domain-classifier, then flow into alert-engine.
    Dashboard and weekly-report are sibling outputs of alert-engine.
    Every node must produce machine-readable artifacts. No prose-only PRs.
  major_capabilities:
    - Signal taxonomy across 4 domains (creator, gaming, open source, dev tools)
    - Multi-source data ingestion pipeline
    - Financial/behavioral indicator schema
    - Domain classifier (signal → financial implication)
    - Alert engine (threshold-based, configurable)
    - Dashboard (real-time signal view)
    - Weekly report generator

graph_version: "1.0"
created_at: "2026-03-23"
last_updated: "2026-03-23"

nodes_dir: nodes/

nodes:
  # --- Entry tier (no dependencies — dispatch all three simultaneously) ---
  - id: signal-taxonomy
    title: Define signal taxonomy for all 4 domains
    status: pending
    type: capability

  - id: data-source-map
    title: Map data sources per domain with access methods
    status: pending
    type: capability

  - id: financial-indicator-schema
    title: Design financial and behavioral indicator schema
    status: pending
    type: capability

  # --- Second tier ---
  - id: ingestion-pipeline
    title: Build multi-source data ingestion pipeline
    status: pending
    type: capability

  - id: domain-classifier
    title: Build domain classifier — signal to financial implication
    status: pending
    type: capability

  # --- Third tier ---
  - id: alert-engine
    title: Build threshold-based alert engine
    status: pending
    type: capability

  # --- Output tier (siblings — dispatch simultaneously after alert-engine) ---
  - id: dashboard
    title: Build real-time signal dashboard
    status: pending
    type: capability

  - id: weekly-report
    title: Build weekly report generator
    status: pending
    type: capability

execution_policy:
  default_executor: jules
  max_concurrent_jobs: 3
  require_human_review_before_overnight: false
  artifact_gate_enforced: true
