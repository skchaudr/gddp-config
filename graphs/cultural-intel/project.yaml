schema_version: "1.0"
schema_type: project_graph

project_id: cultural-intel
project_name: Cultural Intel
description: Local-first cultural signal monitor for open-source dev tools using GitHub and Hacker News data
repo: skchaudr/cultural-intel

blueprint:
  vision: Turn GitHub and Hacker News activity into a daily operator brief and one falsifiable backtest for dev-tool cultural signals
  architecture_notes: |
    The existing repo is not a Codex CLI extension today. It already contains Python ingestion
    scripts, DuckDB storage, research docs, and a thin Node/Express API scaffold. Build from
    that foundation instead of rewriting it. Stay local-first, keep DuckDB as the system of
    record for Phase 0, and prefer a CLI or markdown brief over expanding the web API surface.
    Parallel work should come from independent source and analysis nodes; depends_on is the
    concurrency constraint.
  major_capabilities:
    - GitHub and Hacker News source ingestion with repeatable local refresh
    - watchlist and story-to-repo linking for tracked dev tools
    - derived scorecards for behavioral adoption, identity alignment, and cultural momentum
    - operator-facing brief with ranked signals and anomalies
    - one reproducible backtest for the first hypothesis

graph_version: "1.0"
