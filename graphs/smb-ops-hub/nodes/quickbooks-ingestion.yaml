schema_version: "1.0"
schema_type: node

node_id: quickbooks-ingestion
title: Ingest accounting data from QuickBooks
type: capability

why: |
  Cash position, receivables, and invoice aging are core parts of the operator view. This node
  brings accounting data into the hub in a form the rest of the graph can trust.

depends_on: []

acceptance:
  - File smoke_test_result.json parses as valid JSON
  - smoke_test_result.json contains keys: provider, status, record_count, refreshed_at, entities_ingested
  - smoke_test_result.json status == "pass"
  - smoke_test_result.json record_count >= 1
  - smoke_test_result.json entities_ingested array contains >= 2 accounting entity types

constraints:
  - Keep scope to the accounting entities needed for the first KPI set
  - Do not build invoicing or bookkeeping workflows in this node
  - Preserve enough source fidelity to reconcile hub values back to QuickBooks

allowed_execution_modes:
  - jules

success_artifact:
  file: smoke_test_result.json
  verification: "parse:json, keys_required:[provider, status, record_count, refreshed_at, entities_ingested], field_equals:[status:pass], min_record_count:1"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: smoke_test_result.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, status, record_count, refreshed_at, entities_ingested]
      - field_equals: {status: pass}
      - min_record_count: 1

required_artifacts:
  - smoke_test_result.json

status: ready
priority: high

unlocks:
  - canonical-ops-model
