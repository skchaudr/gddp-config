schema_version: "1.0"
schema_type: node

node_id: app-config-layer
title: Add in-app configuration layer for operators and clients
type: capability

why: |
  The ops-dashboard ships with hardcoded defaults. This node adds the layer
  that lets operators and clients configure the tool without touching code.
  Toggles for integrations, threshold sliders, role-based view switching,
  and UI preference controls. Both user types (owner-operator and client)
  need to be able to adjust what they see and how without a developer present.

depends_on:
  - ops-dashboard

acceptance:
  - File config_schema.json parses as valid JSON
  - config_schema.json contains key: fields (array)
  - config_schema.json fields array contains >= 8 entries
  - Each field entry contains keys: id, type, default, role_access
  - fields array contains >= 3 entries with id prefixed integration_ (one per source: quickbooks, scheduling, workforce)
  - fields array contains >= 1 entry with id prefixed threshold_
  - fields array contains >= 1 entry whose role_access array contains both operator and client

constraints:
  - Config changes must not require a server restart
  - Client view must not expose internal exception thresholds or raw data sources
  - All configurable values must have documented defaults — nothing undefined
  - Do not build a general-purpose admin panel — only expose what operators actually need to change

allowed_execution_modes:
  - jules

success_artifact:
  file: config_schema.json
  verification: "parse:json, keys_required:[fields], each_field_requires:[id, type, default, role_access], min_fields:8"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: config_schema.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [fields]
      - min_fields: 8
      - each_field_requires: [id, type, default, role_access]

required_artifacts:
  - config_schema.json

status: pending
priority: normal

unlocks: []
