schema_version: "1.0"
schema_type: node

node_id: scheduling-ingestion
title: Ingest schedule data from the scheduling system
type: capability

why: |
  The hub needs current schedule state to detect coverage gaps and conflicts before they become
  customer-facing problems. This node brings the scheduling source into the shared model.

depends_on: []

acceptance:
  - File smoke_test_result.json parses as valid JSON
  - smoke_test_result.json contains keys: provider, status, record_count, refreshed_at, entities_ingested
  - smoke_test_result.json status == "pass"
  - smoke_test_result.json record_count >= 1
  - smoke_test_result.json entities_ingested array contains >= 2 schedule entity types (e.g., shifts, assignments)

constraints:
  - Keep scope to schedule visibility, not full schedule editing workflows
  - Preserve enough source fidelity to reconcile hub values back to the scheduling system
  - Avoid broad calendar-sync features in Phase 1

allowed_execution_modes:
  - jules

success_artifact:
  file: smoke_test_result.json
  verification: "parse:json, keys_required:[provider, status, record_count, refreshed_at, entities_ingested], field_equals:[status:pass], min_record_count:1"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: smoke_test_result.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, status, record_count, refreshed_at, entities_ingested]
      - field_equals: {status: pass}
      - min_record_count: 1

required_artifacts:
  - smoke_test_result.json

status: ready
priority: high

unlocks:
  - canonical-ops-model
