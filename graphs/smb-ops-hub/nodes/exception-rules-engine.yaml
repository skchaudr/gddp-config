schema_version: "1.0"
schema_type: node

node_id: exception-rules-engine
title: Evaluate operational exceptions and risk states
type: capability

why: |
  Owner-operators need to know what needs action now, not just what the numbers are. This node
  turns the canonical model into explicit risk states such as overdue invoices, coverage gaps, and
  assignment conflicts.

depends_on:
  - operator-kpi-contract
  - canonical-ops-model

acceptance:
  - File exception_report.json parses as valid JSON
  - exception_report.json contains keys: evaluated_at, rules_run, exceptions, rule_definitions
  - exception_report.json rules_run >= 3
  - Each entry in rule_definitions contains keys: id, threshold, condition, severity
  - Each entry in exceptions contains keys: rule_id, entity_id, entity_type, reason, source_data_ref
  - Running the engine twice on the same input produces identical exception_report.json output

constraints:
  - Keep the first rule set small and high-value
  - Prefer transparent deterministic rules over heuristic scoring initially
  - Do not implement notification channels in this node

allowed_execution_modes:
  - jules

success_artifact:
  file: exception_report.json
  verification: "parse:json, keys_required:[evaluated_at, rules_run, exceptions, rule_definitions], min_rules_run:3"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: exception_report.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [evaluated_at, rules_run, exceptions, rule_definitions]
      - min_rules_run: 3

required_artifacts:
  - exception_report.json

status: pending
priority: high

unlocks:
  - ops-dashboard
  - daily-ops-brief
