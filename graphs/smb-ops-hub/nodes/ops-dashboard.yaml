schema_version: "1.0"
schema_type: node

node_id: ops-dashboard
title: Ship the operator dashboard view
type: capability

why: |
  The hub needs a single visual surface where the owner-operator can see current KPI state and drill
  into the exceptions that matter. This node delivers that primary dashboard experience.

depends_on:
  - operator-kpi-contract
  - canonical-ops-model
  - exception-rules-engine

acceptance:
  - File dashboard_smoke_test.json parses as valid JSON
  - dashboard_smoke_test.json contains keys: status, tested_at, kpis_rendered, exceptions_rendered, healthy_count, at_risk_count
  - dashboard_smoke_test.json status == "pass"
  - dashboard_smoke_test.json kpis_rendered >= 4
  - dashboard_smoke_test.json exceptions_rendered >= 1
  - dashboard_smoke_test.json contains both healthy_count >= 1 and at_risk_count >= 1 (mixed state rendered)

constraints:
  - Keep the dashboard focused on operational decision support, not generic analytics
  - Prefer clear information hierarchy over decorative visualization work
  - Do not add broad customization systems in the first dashboard node

allowed_execution_modes:
  - jules

success_artifact:
  file: dashboard_smoke_test.json
  verification: "parse:json, keys_required:[status, tested_at, kpis_rendered, exceptions_rendered, healthy_count, at_risk_count], field_equals:[status:pass], min_kpis_rendered:4"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: dashboard_smoke_test.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [status, tested_at, kpis_rendered, exceptions_rendered, healthy_count, at_risk_count]
      - field_equals: {status: pass}
      - min_kpis_rendered: 4

required_artifacts:
  - dashboard_smoke_test.json

status: pending
priority: normal

unlocks:
  - app-config-layer
