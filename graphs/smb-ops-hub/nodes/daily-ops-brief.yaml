schema_version: "1.0"
schema_type: node

node_id: daily-ops-brief
title: Generate a daily operations brief
type: capability

why: |
  The operator may not always be in the dashboard. This node creates a compact daily brief that
  summarizes the KPIs and exceptions which need action before the day starts.

depends_on:
  - operator-kpi-contract
  - canonical-ops-model
  - exception-rules-engine

acceptance:
  - File brief_manifest.json parses as valid JSON
  - brief_manifest.json contains keys: generated_at, kpi_summary_included, exception_count, brief_file
  - brief_manifest.json kpi_summary_included == true
  - File named by brief_manifest.json brief_file field exists
  - That file contains sections: KPI Summary, Exceptions, Recommended Checks
  - Running the brief command a second time on the same data produces a brief_manifest.json with an updated generated_at and replaces the prior brief file

constraints:
  - Keep the brief tightly scoped to operational action
  - Avoid duplicating the full dashboard in text form
  - Do not add outbound notification channels in this node

allowed_execution_modes:
  - jules

success_artifact:
  file: brief_manifest.json
  verification: "parse:json, keys_required:[generated_at, kpi_summary_included, exception_count, brief_file], field_equals:[kpi_summary_included:true]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: brief_manifest.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [generated_at, kpi_summary_included, exception_count, brief_file]
      - field_equals: {kpi_summary_included: true}
  - artifact: daily_brief.md
    method: content_check
    rules:
      - sections_required: [KPI Summary, Exceptions, Recommended Checks]

required_artifacts:
  - brief_manifest.json
  - daily_brief.md

status: pending
priority: normal

unlocks: []
