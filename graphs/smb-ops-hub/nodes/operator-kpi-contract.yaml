schema_version: "1.0"
schema_type: node

node_id: operator-kpi-contract
title: Define operator KPIs and exception thresholds
type: capability

why: |
  A dashboard without clear operator questions becomes generic reporting. This node defines which
  numbers and thresholds matter each day so later source and UI work produce an actionable hub.

depends_on: []

acceptance:
  - File kpi_contract.yaml parses as valid YAML
  - kpi_contract.yaml contains keys: kpis, exception_thresholds, operator_loop
  - kpi_contract.yaml kpis array contains >= 4 entries
  - Each KPI entry contains keys: id, name, definition, source, refresh_cadence
  - kpi_contract.yaml exception_thresholds array contains >= 3 entries
  - Each threshold entry contains keys: kpi_id, condition, value, severity

constraints:
  - Focus on a narrow owner-operator workflow, not a generic analytics suite
  - Keep KPI definitions sourceable from the connected systems
  - Do not introduce speculative metrics that cannot be measured from planned integrations

allowed_execution_modes:
  - jules

success_artifact:
  file: kpi_contract.yaml
  verification: "parse:yaml, keys_required:[kpis, exception_thresholds, operator_loop], min_kpis:4, each_kpi_requires:[id, name, definition, source, refresh_cadence]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: kpi_contract.yaml
    method: content_check
    rules:
      - parse: yaml
      - keys_required: [kpis, exception_thresholds, operator_loop]
      - min_kpis: 4
      - each_kpi_requires: [id, name, definition, source, refresh_cadence]

required_artifacts:
  - kpi_contract.yaml

status: ready
priority: high

unlocks:
  - canonical-ops-model
  - exception-rules-engine
  - ops-dashboard
  - daily-ops-brief
