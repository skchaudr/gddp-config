schema_version: "1.0"
schema_type: node

node_id: workforce-ingestion
title: Ingest workforce roster and shift-state data
type: capability

why: |
  Staffing risk depends on who is available, assigned, absent, or overloaded. This node captures
  the workforce-side data needed to interpret schedule gaps and operational risk correctly.

depends_on: []

acceptance:
  - File smoke_test_result.json parses as valid JSON
  - smoke_test_result.json contains keys: provider, status, record_count, refreshed_at, entities_ingested
  - smoke_test_result.json status == "pass"
  - smoke_test_result.json record_count >= 1
  - smoke_test_result.json entities_ingested array contains >= 2 workforce entity types (e.g., employees, roles)

constraints:
  - Keep scope to operational roster visibility, not full HR system replacement
  - Preserve enough source fidelity to reconcile hub values back to the workforce source
  - Avoid payroll or compliance automation in this node

allowed_execution_modes:
  - jules

success_artifact:
  file: smoke_test_result.json
  verification: "parse:json, keys_required:[provider, status, record_count, refreshed_at, entities_ingested], field_equals:[status:pass], min_record_count:1"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: smoke_test_result.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [provider, status, record_count, refreshed_at, entities_ingested]
      - field_equals: {status: pass}
      - min_record_count: 1

required_artifacts:
  - smoke_test_result.json

status: ready
priority: high

unlocks:
  - canonical-ops-model
