schema_version: "1.0"
schema_type: node

node_id: canonical-ops-model
title: Build the canonical operations model
type: capability

why: |
  The hub only becomes coherent when accounting, schedule, and workforce data join into one model
  with stable keys and shared semantics. This node defines that model so later rule and UI nodes do
  not each invent their own partial joins.

depends_on:
  - operator-kpi-contract
  - quickbooks-ingestion
  - scheduling-ingestion
  - workforce-ingestion

acceptance:
  - File ops_model_schema.json parses as valid JSON
  - ops_model_schema.json contains keys: entities, joins, source_map, version
  - ops_model_schema.json entities array contains >= 3 entries
  - Each entity entry contains keys: name, source, primary_key, fields
  - ops_model_schema.json joins array contains >= 2 entries describing cross-source linkages
  - File ops_model_load_result.json parses as valid JSON and contains keys: loaded_at, entities_loaded, errors

constraints:
  - Prefer explicit mapping rules over magical inference
  - Do not let UI needs distort the core data model prematurely
  - Keep the model small enough to reason about and test

allowed_execution_modes:
  - jules

success_artifact:
  file: ops_model_schema.json
  verification: "parse:json, keys_required:[entities, joins, source_map, version], min_entities:3, each_entity_requires:[name, source, primary_key, fields]"

failure_artifact:
  file: failure_report.json
  fields_required:
    - error_type
    - reason
    - partial_artifacts
    - failed_at

artifact_verification:
  - artifact: ops_model_schema.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [entities, joins, source_map, version]
      - min_entities: 3
      - each_entity_requires: [name, source, primary_key, fields]
  - artifact: ops_model_load_result.json
    method: content_check
    rules:
      - parse: json
      - keys_required: [loaded_at, entities_loaded, errors]

required_artifacts:
  - ops_model_schema.json
  - ops_model_load_result.json

status: pending
priority: high

unlocks:
  - exception-rules-engine
  - ops-dashboard
  - daily-ops-brief
