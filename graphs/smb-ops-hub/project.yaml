schema_version: "1.0"
schema_type: project_graph

project_id: smb-ops-hub
project_name: SMB Ops Hub
description: Small-business operations dashboard for accounting, scheduling, and workforce visibility
repo: skchaudr/smb-ops-hub

blueprint:
  vision: Give an owner-operator one place to see cash, staffing, and schedule risk before it becomes a fire drill
  architecture_notes: |
    This project should unify a small set of operational systems instead of becoming a generic BI
    platform. Source connectors for accounting, scheduling, and workforce data should be developed
    as parallel tracks. The hub's value comes from a canonical operations model, a small set of KPI
    views, and explicit exception handling rather than from elaborate visualization alone.
  major_capabilities:
    - KPI contract for cash, staffing, and schedule health
    - source ingestion from QuickBooks, scheduling, and workforce systems
    - canonical operations model joining those sources
    - exception rules for invoices, staffing gaps, and schedule conflicts
    - operator-facing dashboard and daily brief

graph_version: "1.0"
