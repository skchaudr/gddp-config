schema_version: "1.0"
schema_type: project

project_id: gddp-runtime
title: GDAD Runtime Engine
repo: skchaudr/gddp-runtime

# Why this project exists in the graph:
# gddp-runtime is the control plane itself. Nodes here represent
# infrastructure capabilities the system needs to become self-operating.
# The forward loop (dispatch) already works. The return path must remain
# operationally useful without allowing runtime to mutate project truth.
# Merged PRs and executor outputs should become review receipts, while
# graph truth remains human-owned in gddp-config.

nodes:
  - id: return-router
    title: Implement return router — merged PR creates review receipt
    status: complete
    type: infrastructure

  - id: decision-loop-spec
    title: Write decision loop v0 spec — purpose, inputs, outputs, decision loop, failure modes
    status: complete
    type: infrastructure

  - id: decision-loop-runtime
    title: Build decision loop v0 runtime — event-driven reasoning module in gddp-runtime
    status: pending
    type: infrastructure

  - id: decision-loop-review-gate
    title: Build decision loop v0 review gate — lightweight PR eval before accepting node
    status: pending
    type: infrastructure
