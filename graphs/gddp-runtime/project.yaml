schema_version: "1.0"
schema_type: project_graph

project_id: gddp-runtime
project_name: GDDP Runtime Engine
description: The GDDP control plane that dispatches executors and turns their outputs into reviewable receipts while keeping graph truth human-owned
repo: skchaudr/gddp-runtime

blueprint:
  vision: A self-operating control plane where the forward dispatch loop runs autonomously while the return path stays reviewable, never letting runtime mutate project truth
  architecture_notes: |
    gddp-runtime is the execution engine; graph truth lives in gddp-config and is human-owned.
    The forward loop (read graph, dispatch executor) already works. The return path must remain
    operationally useful without allowing runtime to write completion state into project.yaml.
    Merged PRs and executor outputs become review receipts (SQLite results store), and matching
    jobs move into awaiting_review. A decision loop reasons over events and a lightweight review
    gate evaluates PRs before a node is accepted, but graph mutation stays a human decision.
  major_capabilities:
    - return router (merged PR creates a review receipt, no graph mutation)
    - decision loop v0 spec (purpose, inputs, outputs, failure modes)
    - decision loop v0 runtime (event-driven reasoning module)
    - decision loop v0 review gate (lightweight PR eval before accepting a node)
    - semantic harness — terminal verdict tool (structured, self-terminating output)
    - semantic harness — validation-retry (self-correcting on invalid output)
    - verifier receipt contract — separated criteria, artifact, graph-readiness, and next-action signals
    - trustable calibration — split criteria-confidence from artifact/completeness gating
    - pi evaluator harness — drive the semantic evaluator through the pi coding agent for live visibility
    - pi evaluator guard — mechanistic enforcement layer (broad inputs, enforced outputs)
    - evaluator intent/integrity verdict — graduate the contract from criteria satisfaction to intent preservation + graph integrity
    - evaluator canonical context — feed the evaluator canonical docs + DAG neighborhood instead of AGENTS.md
    - ANE verifier-read evaluation — structural low-token reads for the semantic verifier (spike)

graph_version: "1.0"
