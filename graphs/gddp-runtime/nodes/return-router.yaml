schema_version: "1.0"
schema_type: node

node_id: return-router
title: Implement return router — merged PR creates review receipt
type: capability

why: |
  The forward loop already works: an event arrives, the graph is read,
  an executor is dispatched. When a PR merges or an executor returns,
  runtime must not mark graph truth complete. That would collapse
  execution machinery into project truth ownership.

  The return router exists to make the return path reviewable instead of
  automatic. When a PR merges, runtime should parse the node/job metadata,
  validate the linkage, write a structured result receipt to SQLite, and
  move the matching job into review-needed state. A human then decides
  whether the graph should change.

depends_on: []

# Design decisions documented here:
# 1. graph: field dropped from PR body contract — redundant, derived from repo/job
# 2. job metadata is required so merged PR receipts can be linked to persisted runtime work
# 3. results table is the canonical review receipt surface; no graph mutation artifact is required
# 4. ALLOWED_REPOS validated first — cheapest check, fail fast
# 5. graph truth remains human-owned and outside direct runtime mutation

acceptance:
  - id: return-router-file-exists
    criterion: return_router.py exists at scripts/runtime/return_router.py
  - id: handle-merged-pr-validates
    criterion: handle_merged_pr validates repo allowlist, parses node_id and job_id from PR body, validates them against the persisted job, writes a review receipt, and never mutates gddp-config
  - id: parse-node-id-regex
    criterion: 'parse_node_id extracts node id using regex matching "node: <id>" on its own line (case-insensitive, multiline)'
  - id: parse-job-id-regex
    criterion: 'parse_job_id extracts job id using regex matching "job: <id>" on its own line (case-insensitive, multiline)'
  - id: validate-repo-allowlist
    criterion: validate_repo rejects repos not in ALLOWED_REPOS module-level constant (initially skchaudr/vault-doctor)
  - id: graph-updater-disabled
    criterion: graph_updater.py is not an active runtime mechanism; if present, it is explicitly disabled
  - id: results-store-exists
    criterion: results_store.py exists at scripts/runtime/results_store.py
  - id: write-result-inserts-row
    criterion: write_result inserts or updates one row in the canonical results table using the existing result schema surface
  - id: receipts-needs-review
    criterion: merged PR receipts are recorded with status=needs_review
  - id: jobs-moved-to-awaiting-review
    criterion: matching jobs and queue records are moved to awaiting_review
  - id: no-runtime-completion-write
    criterion: no runtime path writes completion into project.yaml or implies automatic node advancement
  - id: tests-cover-return-router
    criterion: tests cover node_id parsed correctly, missing node tag returns rejected, missing job tag returns rejected, and valid merged PRs create review receipts instead of graph updates

constraints:
  - DO NOT repair automatic return completion through the heartbeat runner
  - DO NOT add new graph states
  - DO NOT expand schema shape aggressively
  - DO NOT implement auto-dispatch of next nodes from return handling
  - DO NOT allow runtime to write completion state into gddp-config
  - ALLOWED_REPOS must remain a module-level constant list, not hardcoded inside functions
  - include the node and job metadata block in the PR description as required by the dispatch template

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff

status: complete
priority: high

unlocks:
  - first-overnight-run
