schema_version: "1.0"
schema_type: node

node_id: verification-receipt-contract
title: Define verifier receipt contract with separated judgment, trail, graph, and next-action signals
type: capability

why: |
  The verifier is becoming useful enough that its receipt shape is now part of
  the product contract, not an implementation detail. A live run proved the
  danger of blended signals: criteria could pass semantically while required
  artifacts were missing, and the receipt made that look like low confidence
  instead of a strong code judgment gated by an incomplete trail.

  This node locks the receipt contract before further hardening work piles more
  behavior onto an ambiguous shape. A later visualization, review UI, or
  operator brief should be able to consume one receipt and distinguish four
  questions: criteria satisfaction, execution-trail completeness, graph-advance
  readiness, and the next human/system action.

  Runtime commits 7f803ce and 313925f added the terminal semantic path and the
  first receipt compatibility fields (`confidence`, `criteria_confidence`,
  `completeness_status`). The remaining contract gap is not another status flip:
  it is proving, with docs, fixtures, and a real verifier receipt, that consumers
  can read one receipt without guessing which signal means criteria judgment,
  artifact completeness, graph readiness, or next action.

depends_on:
  - return-router
  - semantic-submit-verdict-tool
  - semantic-validation-retry

acceptance_criteria:
  - id: contract-doc-defines-current-shape
    criterion: 'verification-engine-spec.md or docs/verification-receipt-contract.md in gddp-runtime defines the current VerdictReceipt fields: project_id, node_id, verdict, confidence, criteria_confidence, completeness_status, deterministic, semantic, decision_reasoning, required_next_action, and generated_at'
  - id: confidence-alias-rule-explicit
    criterion: the contract states that confidence is a legacy compatibility alias for criteria_confidence, that new consumers should read criteria_confidence, and that mismatched values are invalid
  - id: completeness-status-enum-defined
    criterion: the contract defines completeness_status values complete, partial, and not-run, including how semantic absence, empty judgments, and budget_exhausted map to those values
  - id: criteria-evidence-shape-defined
    criterion: the contract specifies the per-criterion semantic evidence shape, including criterion_id, judgment, confidence, reasoning, and evidence entries with file/command references when available
  - id: artifact-gate-shape-defined
    criterion: the contract specifies how deterministic.artifacts_present reports required artifacts independently from criteria_confidence, including present, missing, and not-required/no-entry cases
  - id: graph-truth-boundary-explicit
    criterion: the contract states that runtime may emit a receipt and required_next_action but must not mutate gddp-config graph truth directly
  - id: next-action-vocabulary-defined
    criterion: the contract maps required_next_action strings to the operator decisions accept, retry, block, defer, or dispatch-next without requiring readers to infer the action from verdict text alone
  - id: fixture-receipts-cover-ambiguity
    criterion: tests/fixtures/verification_receipts/ or equivalent committed test fixtures include semantic-pass-with-missing-artifacts and semantic-fail-with-complete-artifacts examples, and both validate as VerdictReceipt
  - id: schema-tests-lock-contract
    criterion: scripts/runtime/verification/test_schemas.py or equivalent tests prove legacy confidence-only payloads are accepted, confidence/criteria_confidence mismatches are rejected, and missing completeness_status is backfilled deterministically
  - id: runtime-receipt-proves-node
    criterion: this node is not complete until a runtime-generated verifier receipt for verification-receipt-contract is attached to the handoff or result artifacts and shows the contract fields populated without graph mutation

constraints:
  - documentation, fixtures, schema compatibility tests, and receipt-generation proof only; do not change confidence calibration in this node
  - do not change verifier decision matrix behavior; verdict-confidence-split owns calibration behavior
  - do not add a visualization, dashboard, web UI, or graph rendering structure
  - preserve backward compatibility for existing receipt readers unless the contract doc explicitly names a migration path
  - keep graph truth human-owned; do not revive or replace graph_updater.py
  - do not mark this node complete from code inspection alone; require a runtime verifier receipt generated in the completion round

allowed_execution_modes:
  - human
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff

status: complete
priority: critical

unlocks:
  - verdict-confidence-split
