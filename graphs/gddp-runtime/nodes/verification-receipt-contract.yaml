schema_version: "1.0"
schema_type: node

node_id: verification-receipt-contract
title: Define verifier receipt contract with separated judgment, trail, graph, and next-action signals
type: capability

why: |
  The verifier is becoming useful enough that its receipt shape is now part of
  the product contract, not an implementation detail. A live run proved the
  danger of blended signals: criteria could pass semantically while required
  artifacts were missing, and the receipt made that look like low confidence
  instead of a strong code judgment gated by an incomplete trail.

  This node locks the receipt contract before further hardening work piles more
  behavior onto an ambiguous shape. A later visualization, review UI, or
  operator brief should be able to consume one receipt and distinguish four
  questions: criteria satisfaction, execution-trail completeness, graph-advance
  readiness, and the next human/system action.

  Runtime commit 7f803ce added partial receipt fields (`criteria_confidence`,
  `completeness_status`), but there is still no contract doc or fixture set
  defining how consumers should interpret them. This is now the next real
  blocker before calibration changes should advance.

depends_on:
  - return-router
  - semantic-submit-verdict-tool
  - semantic-validation-retry

acceptance:
  - id: contract-doc-exists
    criterion: docs/verification-receipt-contract.md exists in gddp-runtime and defines the verifier receipt as a stable consumer-facing contract
  - id: four-signals-separated
    criterion: the contract defines separate fields or sections for criteria judgment, execution-trail completeness, graph-advance readiness, and next action; no single scalar is allowed to stand in for all four
  - id: criteria-evidence-shape-defined
    criterion: the contract specifies the per-criterion evidence shape, including criterion id, verdict, confidence, reasoning, and file/command evidence when available
  - id: artifact-gate-shape-defined
    criterion: the contract specifies how required artifacts are reported independently from criteria confidence, including present, missing, and not-required states
  - id: graph-truth-boundary-explicit
    criterion: the contract states that runtime may emit an acceptance candidate or needs-review receipt but must not mutate gddp-config graph truth directly
  - id: next-action-enum-defined
    criterion: the contract defines the allowed next actions as accept, retry, block, defer, or dispatch-next, with one selected action per receipt
  - id: fixture-receipts-included
    criterion: at least two fixture receipt examples exist under tests/fixtures/verification_receipts/ showing semantic-pass-with-missing-artifacts and semantic-fail-with-complete-artifacts

constraints:
  - documentation and fixtures only unless a tiny schema dataclass update is required to name the contract fields
  - do not change verifier decision logic in this node; verdict-confidence-split owns calibration behavior
  - do not add a visualization, dashboard, web UI, or graph rendering structure
  - preserve backward compatibility for existing receipt readers unless the contract doc explicitly names a migration path
  - keep graph truth human-owned; do not revive or replace graph_updater.py

allowed_execution_modes:
  - human
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff

status: ready
priority: critical

unlocks:
  - verdict-confidence-split
