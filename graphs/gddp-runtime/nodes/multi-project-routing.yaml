schema_version: "1.0"
schema_type: node

node_id: multi-project-routing
title: Multi-project routing
type: capability

why: Run more than one real project without cross-talk

depends_on: 
  - project-onboarding-lane
  - first-overnight-run

acceptance:
  - two distinct project repos are configured and recognized by runtime routing
  - events for each repo are routed to the correct project graph without misclassification
  - logs, queue records, and result records preserve project identity for both repos
  - one verification run demonstrates that activity in project A does not create jobs or completions in project B

constraints: []

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - graph-update.yaml
  - patch.diff
  - merged_pr

status: pending
priority: high

unlocks: []
