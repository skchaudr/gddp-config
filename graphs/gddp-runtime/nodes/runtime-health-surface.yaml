schema_version: "1.0"
schema_type: node

node_id: runtime-health-surface
title: Runtime health surface
type: capability

why: Provide one operator view for gateway, intake, queue, results, and services

depends_on: 
  - gateway-operating-baseline

acceptance:
  - one canonical health command or script exists in the repo
  - running it reports pass/fail status for gateway, intake path, return loop, and required services
  - the command exits non-zero when any required check fails
  - the operator runbook documents how to invoke it and interpret failures

constraints: []

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - graph-update.yaml
  - patch.diff
  - merged_pr

status: pending
priority: high

unlocks:
  - first-overnight-run
  - recovery-runbook
