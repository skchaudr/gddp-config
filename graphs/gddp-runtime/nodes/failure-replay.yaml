schema_version: "1.0"
schema_type: node

node_id: failure-replay
title: Failure replay mechanics
type: capability

why: Replay failed or partial runtime steps safely

depends_on: 
  - return-router

acceptance:
  - a concrete replay entrypoint exists and accepts a stable identifier such as `result_id` or `job_id`
  - replay reads persisted job/event/result context from the runtime store rather than reconstructed operator memory
  - replay documentation states exactly what is replayed, what is not replayed, and what safeguards apply
  - at least one bounded replay scenario is demonstrated end-to-end without manual DB surgery

constraints: []

allowed_execution_modes:
  - jules

required_artifacts:
  - decision.md
  - result-summary.md
  - graph-update.yaml
  - patch.diff
  - merged_pr

status: ready
priority: high

unlocks:
  - first-overnight-run
  - recovery-runbook
