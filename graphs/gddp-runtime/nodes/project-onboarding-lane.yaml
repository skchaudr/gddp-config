node_id: project-onboarding-lane
title: Project onboarding lane
type: capability

why: Provide a repeatable path for adding new project graphs

depends_on: 
  - dispatch-contract-freeze

acceptance:
  - a repeatable onboarding path exists as either a script or a documented command sequence
  - onboarding creates a valid `graphs/<project-id>/project.yaml` and starter node scaffolding
  - the generated scaffold parses cleanly against current YAML/schema expectations
  - a second project can be added without manual copy-paste from an existing live project directory

