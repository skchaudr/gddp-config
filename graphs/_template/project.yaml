schema_version: "1.0"
schema_type: project_graph

# ---------------------------------------------------------------------------
# Project Graph Template
# Copy this folder to graphs/<project-id>/ for each new project.
# The graph is the source of truth. Agents never modify this file.
# ---------------------------------------------------------------------------

project_id: REPLACE_ME                 # kebab-case
project_name: REPLACE_ME
description: REPLACE_ME
repo: REPLACE_ME                       # org/repo

blueprint:
  vision: REPLACE_ME                   # one sentence: what this project is
  architecture_notes: REPLACE_ME       # key constraints that shape the whole project
  major_capabilities:
    - REPLACE_ME

graph_version: "1.0"
created_at: REPLACE_ME
last_updated: REPLACE_ME

nodes_dir: nodes/                      # node YAML files live here

# ---------------------------------------------------------------------------
# Node index (for human navigation — system reads nodes/ directory directly)
# ---------------------------------------------------------------------------
nodes:
  - id: REPLACE_ME
    title: REPLACE_ME
    status: pending
    type: capability

# ---------------------------------------------------------------------------
# Execution policy for this project
# ---------------------------------------------------------------------------
execution_policy:
  default_executor: jules
  max_concurrent_jobs: 1               # increase after first successful mission
  require_human_review_before_overnight: true
  artifact_gate_enforced: true
