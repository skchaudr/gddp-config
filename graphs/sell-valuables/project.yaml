project_id: sell-valuables
project_name: Sell Valuables Pipeline
description: iMessage intake folders to listing markdown to Facebook Marketplace posting
  hooks
repo: skchaudr/Automating-Selling-Random-Valuables
blueprint:
  vision: Turn Chris's junk-removal finds into local marketplace listings with minimal
    operator friction
  architecture_notes: 'Intake is folder-based under incoming/<item-id>/ with description.txt,
    optional meta.yaml, and photos/.

    Core is Python CLI scripts (sell-listing, sell-post-fb), not a monolithic app.

    Facebook Marketplace has no public API; browser automation lives behind explicit
    hooks with dry_run before submit.

    One item per folder; listing evidence is listing.md written beside intake files.

    '
  major_capabilities:
  - intake folder convention and ItemIntake loader
  - listing title/body/markdown generation
  - sell-listing CLI
  - Facebook post hook and Playwright session/form-fill path
  - iMessage-to-folder operator workflow
  - pytest coverage for intake and listing
