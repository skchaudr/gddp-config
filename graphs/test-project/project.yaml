schema_version: "1.0"
schema_type: project_graph

project_id: test-project
project_name: Test Project (Canary)
description: Canary project graph used to exercise the evaluator retry loop. Contains a single node whose acceptance criteria include a documentation requirement not surfaced in the goal or required artifacts, so the first executor pass is expected to fail-with-evidence and trigger re-dispatch.
repo: skchaudr/test-project

blueprint:
  vision: A throwaway project that proves the retry loop fires when the evaluator produces a judged_fail verdict with file-path evidence
  architecture_notes: |
    Single-node graph. The canary node asks for an echo utility plus a docs file.
    The docs file is an acceptance criterion but is NOT listed in required_artifacts
    or mentioned in the goal, so the executor will likely miss it on first attempt.
    The evaluator's semantic lane should judge criterion 3 as judged_fail with
    evidence referencing "docs/echo-usage.md", causing has_criteria_evidence to
    return True and the retry loop to re-dispatch.
  major_capabilities:
    - echo utility with documentation requirement (canary)

graph_version: "1.0"
created_at: 2026-07-11
last_updated: 2026-07-11

nodes_dir: nodes/

nodes:
  - id: canary-retry-proof
    title: "Canary: echo utility with documentation requirement"
    status: ready
    type: capability

execution_policy:
  default_executor: jules
  max_concurrent_jobs: 1
  retry_budget: 3
  require_human_review_before_overnight: false
  artifact_gate_enforced: true
  allowed_repos:
    - skchaudr/test-project
