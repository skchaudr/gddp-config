schema_version: "1.0"
schema_type: node

node_id: prove-trusted-context-brief
title: Prove one trusted MyAPI context-brief round trip
type: capability
why: >-
  MyAPI earns trust when a cold agent receives a compact, current, attributable brief
  and can continue correctly without rescanning the corpus or inventing project state.

depends_on: []

acceptance_criteria:
  - id: current-ground-truth-reconciled
    criterion: >-
      One canonical decision record reconciles the conflicting planning-only and
      deployed-system claims in current project documents and names the live components,
      authoritative corpus, active branch, and intentionally historical surfaces.
  - id: smallest-query-path-defined
    criterion: >-
      One operator-facing query path is selected and documented end to end, including
      its input envelope, context budget, freshness window, evidence controls, service
      dependencies, and structured output contract.
  - id: context-brief-receipt
    criterion: >-
      A repeatable smoke query returns a bounded project context brief containing current
      intent, decisions, evidence references, freshness metadata, and measured latency,
      with the raw request and response preserved as a receipt.
  - id: cold-agent-continuation-proof
    criterion: >-
      A cold agent given only the returned brief identifies the correct project state,
      next bounded action, and key constraint without a repository-wide scan, and its
      answer is scored against a versioned expected-answer rubric.
  - id: stale-or-missing-evidence-visible
    criterion: >-
      A negative test shows that stale, contradictory, or missing evidence is surfaced
      explicitly rather than silently synthesized into a confident answer.
  - id: startup-and-recovery-runbook
    criterion: >-
      A copy-pasteable runbook covers health check, start, stop, corpus freshness check,
      one induced dependency failure, recovery, and confirmation that idle paid compute
      is stopped.

constraints:
  - do not expand bulk ingestion or add retrieval lanes until the single brief path passes the cold-agent continuation test
  - keep the public MCP surface limited to project and person context tools unless evidence justifies another tool
  - default retrieval to the recent active window and include older material only when marked durable, canonical, baseline, or reference
  - make context budget, freshness, provenance, and uncertainty visible in every returned envelope
  - keep services private to the tailnet and never commit credentials or private corpus content as test fixtures

allowed_execution_modes:
  - vm_worker
  - human

required_artifacts:
  - decision.md
  - result-summary.md
  - patch.diff
  - graph-update.yaml

status: ready
priority: critical
unlocks: []
