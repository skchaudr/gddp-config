schema_version: "1.0"
schema_type: project_graph

project_id: myapi
project_name: MyAPI Personal Context Engine
description: >-
  Make MyAPI a trustworthy context-brief service that lets a cold agent continue
  current work without re-litigating project intent or drowning in the old corpus.
repo: skchaudr/MyAPI

blueprint:
  vision: >-
    Return small, fresh, evidence-backed project and person context briefs on demand.
  architecture_notes: >-
    Treat durable handoffs and canonical anchors as the product, with recent active
    context as the default corpus window. Keep MyAPI as the context engine and the
    public MCP doorway lean. Resolve conflicting status claims before adding retrieval
    complexity, and prove value with a cold-agent continuation test plus transparent
    freshness, provenance, and latency receipts.
  major_capabilities:
    - canonical ground truth for the current MyAPI architecture and operating state
    - compact project and person context briefs with visible evidence and freshness
    - repeatable startup, query, recovery, and cold-agent continuation proof

graph_version: "1.0"
created_at: 2026-07-17
last_updated: 2026-07-17

nodes_dir: nodes/

nodes:
  - id: prove-trusted-context-brief
    title: Prove one trusted MyAPI context-brief round trip
    status: ready
    type: capability

execution_policy:
  default_executor: vm_worker
  max_concurrent_jobs: 1
  retry_budget: 2
  require_human_review_before_overnight: true
  artifact_gate_enforced: true
