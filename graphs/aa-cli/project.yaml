schema_version: '1.0'
schema_type: project_graph
project_id: aa-cli
project_name: AA CLI
description: Zsh task compiler and dispatcher that turns prompts into validated packets,
  routes them to executor targets, and tracks runs in a TSV ledger
repo: skchaudr/aa-cli
blueprint:
  vision: A terminal-first dispatch shell where one keystroke fires a validated packet
    to the right executor and every run leaves a ledger receipt
  architecture_notes: 'Pure zsh CLI with lib/ modules sourced from bin/aa. Packets
    are JSON validated against schema/packet.schema.json.

    targets.conf maps target names to sync/async commands; aa_fire_packet in lib/fire.zsh
    is the central router.

    Async targets (codex, jules, pi) dispatch in background and reconcile later updates
    ledger state from exit_status or remote session status.

    State lives under AA_DATA_HOME (packets) and AA_STATE_HOME (runs, ledger.tsv).

    '
  major_capabilities:
  - shared path/init/validation helpers (common-core)
  - target registry lookup from targets.conf (target-registry)
  - TSV ledger append/update and stale detection (ledger-system)
  - packet fire routing by target mode and async placeholders (dispatch-router)
  - per-executor dispatch paths (grok, pi-cli, gemini, droid, codex, jules, pi-harness)
  - async job reconciliation for codex/jules open rows (reconciliation)
graph_version: '1.0'
